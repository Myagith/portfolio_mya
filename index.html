<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .projects, .skills, .contact {
            padding: 50px 20px;
        }
        h1, h2 {
            margin: 10px 0;
        }
        a {
            color: #1e90ff;
            text-decoration: none;
        }
        .project {
            margin: 20px 0;
            transition: transform 0.3s;
        }
        .project:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Welcome to My Portfolio</h1>
        <p>Discover my projects and skills</p>
    </section>
    <section class="projects">
        <h2>Projects</h2>
        <div class="project">
            <h3>Project 1</h3>
            <p>Description of project 1.</p>
        </div>
        <div class="project">
            <h3>Project 2</h3>
            <p>Description of project 2.</p>
        </div>
        <div class="project">
            <h3>Project 3</h3>
            <p>Description of project 3.</p>
        </div>
    </section>
    <section class="skills">
        <h2>Skills</h2>
        <p>JavaScript, HTML, CSS, React</p>
    </section>
    <section class="contact">
        <h2>Contact Me</h2>
        <p>Email: <a href="mailto:mya@example.com">mya@example.com</a></p>
    </section>
</body>
</html>
